name: CI

on:
  push:
  pull_request:

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.4
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: terraform init
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init
          tflint --recursive --minimum-failure-severity=error

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Show installed versions
        run: |
          python --version
          pip freeze

      - name: pytest
        run: |
          set +e
          pytest -v -ra --tb=long --reruns 2 --reruns-delay 2 2>&1 | tee /tmp/pytest.log
          ec=${PIPESTATUS[0]}
          {
            echo '### pytest output'
            echo
            echo '```'
            cat /tmp/pytest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$ec" -ne 0 ]; then
            grep -E "^FAILED |^ERROR " /tmp/pytest.log | while IFS= read -r line; do
              echo "::error::$line"
            done
            tail -60 /tmp/pytest.log | python3 -c '
import sys
buf = sys.stdin.read().replace("%","%25").replace("\r","%0D").replace("\n","%0A")
print(f"::error title=pytest tail::{buf}")
'
          fi
          exit "$ec"
